<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Atelier Molicare | Boutique Artisanale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f0f0f; --text: #ffffff; --card: #1a1a1a; --accent: #d97706; }
        .light-mode { --bg: #f8f9fa; --text: #1a1a1a; --card: #ffffff; --accent: #b45309; }
        body { background-color: var(--bg); color: var(--text); transition: 0.3s; font-family: 'Inter', sans-serif; }
        .product-card { 
            background-color: var(--card); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; 
            overflow: hidden;
            transition: 0.3s;
        }
        .product-card:hover { transform: scale(1.02); border-color: var(--accent); }
        .price-tag { color: var(--accent); font-size: 1.5rem; font-weight: 800; }
        .badge { background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-black uppercase tracking-tighter">MOLI<span class="text-amber-600">CARE</span></h1>
        <button onclick="toggleTheme()" class="p-2 bg-white/5 rounded-full w-10 h-10"><i id="theme-icon" class="fas fa-sun"></i></button>
    </header>

    <section class="py-16 text-center">
        <h2 class="text-4xl md:text-6xl font-extrabold mb-4">Boutique Officielle</h2>
        <p class="opacity-60">Objets uniques en bois noble, tournés à la main.</p>
    </section>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10 px-6 pb-20">
        
        <div class="product-card">
            <a href="produit-crayon.html" class="h-64 bg-white/5 flex items-center justify-center border-b border-white/10 relative block">
                <span class="absolute top-4 left-4 badge">Pièce Unique</span>
                <i class="fas fa-pen text-5xl opacity-20"></i>
            </a>
            <div class="p-6">
                <h3 class="text-xl font-bold mb-1">Crayon en Noyer</h3>
                <div class="flex justify-between items-center">
                    <span class="price-tag">25€</span>
                    <a href="produit-crayon.html" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-bold text-sm">Voir l'article</a>
                </div>
            </div>
        </div>

        <div class="product-card">
            <a href="produit-decapsuleur.html" class="h-64 bg-white/5 flex items-center justify-center border-b border-white/10 relative block">
                <span class="absolute top-4 left-4 badge">Top Vente</span>
                <i class="fas fa-wine-bottle text-5xl opacity-20"></i>
            </a>
            <div class="p-6">
                <h3 class="text-xl font-bold mb-1">Décapsuleur "L'Écorce"</h3>
                <div class="flex justify-between items-center">
                    <span class="price-tag">40€</span>
                    <a href="produit-decapsuleur.html" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-bold text-sm">Voir l'article</a>
                </div>
            </div>
        </div>

        <div class="product-card">
            <a href="produit-cuillere.html" class="h-64 bg-white/5 flex items-center justify-center border-b border-white/10 relative block">
                <span class="absolute top-4 left-4 badge">Art de la table</span>
                <i class="fas fa-utensils text-5xl opacity-20"></i>
            </a>
            <div class="p-6">
                <h3 class="text-xl font-bold mb-1">Cuillère à Miel</h3>
                <div class="flex justify-between items-center">
                    <span class="price-tag">25€</span>
                    <a href="produit-cuillere.html" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-bold text-sm">Voir l'article</a>
                </div>
            </div>
        </div>

    </main>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-sun');
            icon.classList.toggle('fa-moon');
        }
    </script>
</body>
</html>
